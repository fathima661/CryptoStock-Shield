{% extends "base.html" %}
{% load widget_tweaks %}

{% block title %}Register | CryptoStock Shield{% endblock %}

{% block content %}

<section class="max-w-md mx-auto mt-12 sm:mt-16 px-4 sm:px-6 py-6 sm:py-8 bg-[#1f2937]/80 backdrop-blur rounded-xl shadow-lg">

    <h2 class="text-xl sm:text-2xl font-bold text-white text-center mb-6">
        Create Your Account
    </h2>

    <p id="registerError" class="text-xs sm:text-sm text-red-400 hidden mb-3"></p>

    <form id="registerForm" class="space-y-4">

        {% csrf_token %}

        <input type="email" name="email" required
            placeholder="Email"
            class="w-full p-3 sm:p-3.5 text-sm sm:text-base rounded bg-[#0b1220] border border-gray-600 text-gray-200">

        <div class="relative">
            <input type="password" id="password1" name="password1" required
                placeholder="Password"
                class="w-full p-3 sm:p-3.5 text-sm sm:text-base pr-12 rounded bg-[#0b1220] border border-gray-600 text-gray-200">

            <button type="button"
                onclick="togglePassword('password1','eye1','eyeOff1')"
                class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 p-2 text-white hover:text-blue-400 transition">

                <svg id="eye1" xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>

                <svg id="eyeOff1" xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 hidden"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-width="2" d="M3 3l18 18"/>
                </svg>
            </button>
        </div>

        <div class="relative">
            <input type="password" id="password2" name="password2" required
                placeholder="Confirm Password"
                class="w-full p-3 sm:p-3.5 text-sm sm:text-base pr-12 rounded bg-[#0b1220] border border-gray-600 text-gray-200">

            <button type="button"
                onclick="togglePassword('password2','eye2','eyeOff2')"
                class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 p-2 text-white hover:text-blue-400 transition">

                <svg id="eye2" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>

                <svg id="eyeOff2" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-width="2" d="M3 3l18 18"/>
                </svg>
            </button>
        </div>

        <button id="registerBtn"
            class="w-full bg-blue-500 hover:bg-blue-600 py-3 sm:py-3.5 text-sm sm:text-base rounded-lg text-white font-semibold transition">
            Register
        </button>

    </form>
</section>

{% endblock %}

{% block scripts %}
{{ block.super }}

<script>

// ================= PASSWORD TOGGLE =================
function togglePassword(inputId, eyeId, eyeOffId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    const eyeOff = document.getElementById(eyeOffId);

    if (input.type === "password") {
        input.type = "text";
        eye.classList.add("hidden");
        eyeOff.classList.remove("hidden");
    } else {
        input.type = "password";
        eye.classList.remove("hidden");
        eyeOff.classList.add("hidden");
    }
}

// ================= REGISTER =================
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const btn = document.getElementById("registerBtn");
    const errorBox = document.getElementById("registerError");

    errorBox.classList.add("hidden");

    btn.disabled = true;
    btn.textContent = "Creating account...";

    try {
        const formData = new FormData(this);

        const response = await fetch("/register/", {
            method: "POST",
            body: formData,
            headers: {
                "X-Requested-With": "XMLHttpRequest"
            }
        });

        const data = await response.json();

        if (data.success) {
            
            window.location.href = data.redirect; 
        } else {
            errorBox.textContent = data.error || "Registration failed";
            errorBox.classList.remove("hidden");
        }

    } catch (err) {
        errorBox.textContent = "Server error. Try again.";
        errorBox.classList.remove("hidden");
    }

    btn.disabled = false;
    btn.textContent = "Register";
});

</script>

{% endblock %}
